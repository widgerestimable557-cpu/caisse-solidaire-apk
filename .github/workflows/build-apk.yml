name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-disabled: true
      - uses: android-actions/setup-android@v3
      - name: Show project files
        run: |
          echo "=== MANIFEST ==="
          cat app/src/main/AndroidManifest.xml
          echo "=== RES FILES ==="
          find app/src/main/res -type f | sort
          echo "=== JAVA FILES ==="
          find app/src/main/java -type f | sort
      - name: Build Debug APK
        run: gradle assembleDebug --info 2>&1 | head -100
